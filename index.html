<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Probador Oftalmo Daluz</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f4; padding: 20px; }
        video, canvas { width: 100%; max-width: 500px; border-radius: 15px; background: #000; }
        .btn { background: #0055ff; color: white; border: none; padding: 15px 30px; border-radius: 30px; font-size: 18px; cursor: pointer; margin-top: 10px; }
        #foto { display: none; border: 5px solid #fff; }
    </style>
</head>
<body>
    <h2>Espejo Virtual - Oftalmo Daluz</h2>
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas" style="display:none;"></canvas>
    <img id="foto" alt="Tu foto">
    
    <br>
    <button id="snap" class="btn">TOMAR FOTO</button>
    <button id="reset" class="btn" style="display:none; background:#888;">PROBAR OTRA VEZ</button>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const snap = document.getElementById('snap');
        const foto = document.getElementById('foto');
        const reset = document.getElementById('reset');

        // Acceder a la cámara
        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => { video.srcObject = stream; })
            .catch(err => { alert("Error al acceder a la cámara. Por favor, permite los permisos."); });

        // Tomar la foto
        snap.addEventListener('click', () => {
            const context = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0);
            
            foto.src = canvas.toDataURL('image/png');
            foto.style.display = 'inline-block';
            video.style.display = 'none';
            snap.style.display = 'none';
            reset.style.display = 'inline-block';
        });

        // Resetear
        reset.addEventListener('click', () => {
            foto.style.display = 'none';
            video.style.display = 'inline-block';
            snap.style.display = 'inline-block';
            reset.style.display = 'none';
        });
    </script>
</body>
</html>
